micronaut.application.name=sistema-moeda-estudantil
micronaut.server.port=8080
micronaut.server.cors.enabled=true
micronaut.server.cors.configurations.web.allowed-origins[0]=http://localhost:5173
micronaut.server.cors.configurations.web.allowed-origins[1]=http://localhost:3000
micronaut.server.cors.configurations.web.allowed-methods[0]=GET
micronaut.server.cors.configurations.web.allowed-methods[1]=POST
micronaut.server.cors.configurations.web.allowed-methods[2]=PUT
micronaut.server.cors.configurations.web.allowed-methods[3]=DELETE
micronaut.server.cors.configurations.web.allowed-methods[4]=OPTIONS
micronaut.server.cors.configurations.web.allowed-headers[0]=Authorization
micronaut.server.cors.configurations.web.allowed-headers[1]=Content-Type

auth.jwt.secret=moeda-estudantil-lab03-secret-key-min-32-chars
auth.jwt.expiration-hours=24

datasources.default.url=jdbc:postgresql://localhost:5432/moeda_estudantil
datasources.default.driver-class-name=org.postgresql.Driver
datasources.default.username=moeda
datasources.default.password=moeda
datasources.default.dialect=POSTGRES

jpa.default.entity-scan.packages=com.sistemamoedaestudantil.domain
jpa.default.properties.hibernate.hbm2ddl.auto=update
jpa.default.properties.hibernate.show_sql=false
jpa.default.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

email.enabled=true
email.from=anaflavia753@gmail.com
email.smtp.host=localhost
email.smtp.port=5173
email.smtp.username=
email.smtp.password=
email.smtp.auth=false
email.smtp.starttls=false
