# Ambiente dev: PostgreSQL embutido + e-mail real via Gmail (simulação).

# Ativa envio real de e-mail
email.enabled=true

# Gambiarra: todo e-mail destinado a ALUNO vai para este Gmail
email.override-aluno=EMAIL

# Conta Gmail que ENVIA (pode ser a mesma)
email.from=EMAIL
email.smtp.host=smtp.gmail.com
email.smtp.port=587
email.smtp.username=EMAIL
email.smtp.password=
email.smtp.auth=true
email.smtp.starttls=true
